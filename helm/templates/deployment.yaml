apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "formatter.fullname" . }}
  labels:
    {{- include "formatter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "formatter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "formatter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "formatter.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.app.port | quote }}

            {{- if .Values.app.configsDir }}
            - name: CONFIGS_DIR
              value: {{ .Values.app.configsDir | quote }}
            {{- end }}

            {{- if .Values.app.configs }}
            - name: CONFIGS_JSON
              value: >-
                [
                {{- $first := true }}
                {{- range .Values.app.configs }}
                  {{- if and . .id .source }}
                    {{- if not $first }},{{- else }}{{- $first = false -}}{{- end }}
                    {
                      "id": {{ .id | quote }},
                      "name": {{ .name | quote }}
                      {{- if eq .source "inline" -}}
                        ,"sourceType": "local"
                        ,"localPath": {{ printf "/app/config/%s.yaml" .id | quote }}
                      {{- else if eq .source "configmap" -}}
                        ,"sourceType": "local"
                        ,"localPath": {{ printf "/app/config/%s/%s" .id (default "schema.yaml" (and .configmap .configmap.key)) | quote }}
                      {{- else if eq .source "secret" -}}
                        ,"sourceType": "local"
                        ,"localPath": {{ printf "/app/config/%s/%s" .id (default "schema.yaml" (and .secret .secret.key)) | quote }}
                      {{- else if eq .source "url" -}}
                        ,"sourceType": "url"
                        ,"url": {{ (and .url .url.address) | quote }}
                        ,"urlIgnoreSsl": {{ if and .url .url.ignoreSsl }}{{ .url.ignoreSsl }}{{ else }}false{{ end }}
                      {{- else if eq .source "git" -}}
                        ,"sourceType": "git"
                        ,"gitRepoUrl": {{ (and .git .git.repoUrl) | quote }}
                        ,"gitBranch": {{ if and .git .git.branch }}{{ .git.branch | quote }}{{ else }}"main"{{ end }}
                        ,"gitConfigPath": {{ if and .git .git.configPath }}{{ .git.configPath | quote }}{{ else }}"variables.tf"{{ end }}
                        {{- if and .git (or .git.token .git.existingTokenSecret) -}}
                          ,"gitToken": {{ printf "$GIT_TOKEN_%s" (.id | upper | replace "-" "_") | quote }}
                        {{- end -}}
                      {{- end -}}
                    }
                  {{- end }}
                {{- end }}
                ]
            {{- end }}

            {{- range .Values.app.configs }}
            {{- if and . .id (eq .source "git") }}
            {{- if and .git (or .git.token .git.existingTokenSecret) }}
            - name: GIT_TOKEN_{{ .id | upper | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ .git.existingTokenSecret | default (printf "%s-git-token-%s" (include "formatter.fullname" $) .id) }}
                  key: GIT_TOKEN
            {{- end }}
            {{- end }}
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          volumeMounts:
            - name: git-repos-volume
              mountPath: /app/git-repos
            
            {{- $hasInline := false }}
            {{- range .Values.app.configs }}
              {{- if and . (eq .source "inline") }}{{ $hasInline = true }}{{ end }}
            {{- end }}
            {{- if $hasInline }}
            - name: inline-configs-volume
              mountPath: /app/config
            {{- end }}

            {{- range .Values.app.configs }}
            {{- if and . .id (eq .source "configmap") }}
            - name: configmap-volume-{{ .id }}
              mountPath: {{ printf "/app/config/%s" .id }}
            {{- else if and . .id (eq .source "secret") }}
            - name: secret-volume-{{ .id }}
              mountPath: {{ printf "/app/config/%s" .id }}
            {{- end }}
            {{- end }}

      volumes:
        - name: git-repos-volume
          emptyDir: {}
        
        {{- if $hasInline }}
        - name: inline-configs-volume
          configMap:
            name: {{ include "formatter.fullname" . }}-inline-configs
        {{- end }}

        {{- range .Values.app.configs }}
        {{- if and . .id (eq .source "configmap") }}
        - name: configmap-volume-{{ .id }}
          configMap:
            name: {{ .configmap.name }}
        {{- else if and . .id (eq .source "secret") }}
        - name: secret-volume-{{ .id }}
          secret:
            secretName: {{ .secret.name }}
        {{- end }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
