apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dynamic-form.fullname" . }}
  labels:
    {{- include "dynamic-form.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dynamic-form.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dynamic-form.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "dynamic-form.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.app.port | quote }}

            {{- if .Values.app.configsDir }}
            - name: CONFIGS_DIR
              value: {{ .Values.app.configsDir | quote }}
            {{- end }}

            {{- if .Values.app.configs }}
            - name: CONFIGS_JSON
              value: >-
                [
                {{- range $index, $config := .Values.app.configs }}
                  {{- if $index }},{{ end }}
                  {
                    "id": {{ $config.id | quote }},
                    "name": {{ $config.name | quote }}
                    {{- if eq $config.source "inline" -}}
                      ,"sourceType": "local"
                      ,"localPath": {{ printf "/app/config/%s.yaml" $config.id | quote }}
                    {{- else if eq $config.source "configmap" -}}
                      ,"sourceType": "local"
                      ,"localPath": {{ printf "/app/config/%s/%s" $config.id (default "schema.yaml" $config.configmap.key) | quote }}
                    {{- else if eq $config.source "secret" -}}
                      ,"sourceType": "local"
                      ,"localPath": {{ printf "/app/config/%s/%s" $config.id (default "schema.yaml" $config.secret.key) | quote }}
                    {{- else if eq $config.source "url" -}}
                      ,"sourceType": "url"
                      ,"url": {{ $config.url.address | quote }}
                      ,"urlIgnoreSsl": {{ $config.url.ignoreSsl }}
                    {{- else if eq $config.source "git" -}}
                      ,"sourceType": "git"
                      ,"gitRepoUrl": {{ $config.git.repoUrl | quote }}
                      ,"gitBranch": {{ $config.git.branch | quote }}
                      ,"gitConfigPath": {{ $config.git.configPath | quote }}
                      {{- if or $config.git.token $config.git.existingTokenSecret -}}
                        ,"gitToken": {{ printf "$GIT_TOKEN_%s" ($config.id | upper | replace "-" "_") | quote }}
                      {{- end -}}
                    {{- end -}}
                  }
                {{- end }}
                ]
            {{- end }}

            {{- range .Values.app.configs }}
            {{- if eq .source "git" }}
            {{- if or .git.token .git.existingTokenSecret }}
            - name: GIT_TOKEN_{{ .id | upper | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ .git.existingTokenSecret | default (printf "%s-git-token-%s" (include "dynamic-form.fullname" $) .id) }}
                  key: GIT_TOKEN
            {{- end }}
            {{- end }}
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          volumeMounts:
            - name: git-repos-volume
              mountPath: /app/git-repos
            
            {{- $hasInline := false }}
            {{- range .Values.app.configs }}
              {{- if eq .source "inline" }}{{ $hasInline = true }}{{ end }}
            {{- end }}
            {{- if $hasInline }}
            - name: inline-configs-volume
              mountPath: /app/config
            {{- end }}

            {{- range .Values.app.configs }}
            {{- if eq .source "configmap" }}
            - name: configmap-volume-{{ .id }}
              mountPath: {{ printf "/app/config/%s" .id }}
            {{- else if eq .source "secret" }}
            - name: secret-volume-{{ .id }}
              mountPath: {{ printf "/app/config/%s" .id }}
            {{- end }}
            {{- end }}

      volumes:
        - name: git-repos-volume
          emptyDir: {}
        
        {{- if $hasInline }}
        - name: inline-configs-volume
          configMap:
            name: {{ include "dynamic-form.fullname" . }}-inline-configs
        {{- end }}

        {{- range .Values.app.configs }}
        {{- if eq .source "configmap" }}
        - name: configmap-volume-{{ .id }}
          configMap:
            name: {{ .configmap.name }}
        {{- else if eq .source "secret" }}
        - name: secret-volume-{{ .id }}
          secret:
            secretName: {{ .secret.name }}
        {{- end }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
