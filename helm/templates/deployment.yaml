apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dynamic-form.fullname" . }}
  labels:
    {{- include "dynamic-form.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dynamic-form.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dynamic-form.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "dynamic-form.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}

            {{- /* ── CONFIG_SOURCE envoyé au serveur Node.js ──────────────────────────
                 embedded / inline / configmap / secret → le serveur les traite tous
                 comme "local" (lecture d'un fichier). url et git sont natifs.
            */}}
            {{- if or (eq .Values.config.source "embedded") (eq .Values.config.source "inline") (eq .Values.config.source "configmap") (eq .Values.config.source "secret") }}
            - name: CONFIG_SOURCE
              value: "local"
            {{- else }}
            - name: CONFIG_SOURCE
              value: {{ .Values.config.source | quote }}
            {{- end }}

            {{- /* ── CONFIG_PATH inféré automatiquement selon la source ─────────────
                 embedded  → schéma intégré dans l'image
                 inline / configmap / secret → volume monté dans /app/config
                 url / git → non utilisé (chemin géré côté serveur)
            */}}
            {{- if eq .Values.config.source "embedded" }}
            - name: CONFIG_PATH
              value: "/app/examples/schema.yaml"
            {{- else if or (eq .Values.config.source "inline") (eq .Values.config.source "configmap") (eq .Values.config.source "secret") }}
            - name: CONFIG_PATH
              value: {{ .Values.config.path | default "/app/config/schema.yaml" | quote }}
            {{- end }}

            {{- if .Values.config.configs }}
            - name: CONFIGS_JSON
              value: {{ toJson .Values.config.configs | quote }}
            {{- end }}

            {{- /* ── Mode url ─────────────────────────────────────────────────────── */}}
            {{- if eq .Values.config.source "url" }}
            - name: URL_ADDRESS
              value: {{ .Values.config.url.address | quote }}
            - name: URL_IGNORE_SSL
              value: {{ .Values.config.url.ignoreSsl | quote }}
            {{- end }}

            {{- /* ── Mode git ─────────────────────────────────────────────────────── */}}
            {{- if eq .Values.config.source "git" }}
            - name: GIT_REPO_URL
              value: {{ .Values.config.git.repoUrl | quote }}
            - name: GIT_BRANCH
              value: {{ .Values.config.git.branch | quote }}
            - name: GIT_CONFIG_PATH
              value: {{ .Values.config.git.configPath | quote }}
            {{- if or .Values.config.git.token .Values.config.git.existingTokenSecret }}
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.git.existingTokenSecret | default (printf "%s-git-token" (include "dynamic-form.fullname" .)) }}
                  key: GIT_TOKEN
            {{- end }}
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          volumeMounts:
            - name: git-repos-volume
              mountPath: /app/git-repos
            {{- if or (eq .Values.config.source "inline") (eq .Values.config.source "configmap") (eq .Values.config.source "secret") }}
            - name: config-volume
              mountPath: /app/config
            {{- end }}

      {{- /* ── Définition des volumes ───────────────────────────────────────────── */}}
      volumes:
        - name: git-repos-volume
          emptyDir: {}
        {{- if or (eq .Values.config.source "inline") (eq .Values.config.source "configmap") (eq .Values.config.source "secret") }}
        - name: config-volume
          {{- if eq .Values.config.source "secret" }}
          secret:
            secretName: {{ .Values.config.secret.name }}
          {{- else if eq .Values.config.source "configmap" }}
          configMap:
            name: {{ .Values.config.configmap.name }}
          {{- else }}
          {{- /* source: inline → ConfigMap créé par helm/templates/configmap.yaml */}}
          configMap:
            name: {{ include "dynamic-form.fullname" . }}-schema
          {{- end }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
