{{- if and (eq .Values.config.source "local") (not .Values.configMapName) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dynamic-form.fullname" . }}-schema
  labels:
    {{- include "dynamic-form.labels" . | nindent 4 }}
data:
  schema.yaml: |
    {{- .Values.schemaContent | nindent 4 }}
{{- end }}
