# -- Nombre de réplicas du pod
replicaCount: 1

image:
  # -- Registre + nom de l'image
  repository: ghcr.io/ookami-git/formatter
  # -- Tag de l'image (défaut: chart appVersion)
  tag: ""
  # -- Politique de pull
  pullPolicy: IfNotPresent

# -- Secrets pour pull images privées (ghcr.io nécessite un token)
imagePullSecrets: []
#  - name: ghcr-pull-secret

nameOverride: ""
fullnameOverride: ""

# ──────────────────────────────────────────────
# Configuration de l'application
# ──────────────────────────────────────────────
config:
  # ────────────────────────────────────────────────────────────────────────────
  # Source de configuration — choisissez UNE seule valeur parmi :
  #
  #   embedded  → Utilise le schéma exemple intégré dans l'image Docker.
  #               (/app/examples/schema.yaml). Aucune configuration requise.
  #
  #   inline    → Définit le schéma directement dans ce fichier via config.inline.schema.
  #               Un ConfigMap est créé automatiquement par le chart Helm.
  #
  #   configmap → Monte un ConfigMap Kubernetes existant.
  #               Renseigner config.configmap.name.
  #
  #   secret    → Monte un Secret Kubernetes existant.
  #               Renseigner config.secret.name.
  #
  #   url       → Charge le schéma depuis une URL HTTP/HTTPS à chaque requête.
  #               Renseigner config.url.address.
  #
  #   git       → Clone un dépôt Git au démarrage et à chaque rafraîchissement.
  #               Renseigner config.git.* ci-dessous.
  # ────────────────────────────────────────────────────────────────────────────
  source: inline

  # -- Port d'écoute du serveur
  port: 3000

  # -- Tableau de configurations pour le mode Multi-Config (injecté via CONFIGS_JSON)
  configs: []
  # Exemple:
  # configs:
  #   - id: frontend
  #     name: "Frontend Schema"
  #     sourceType: local
  #     localPath: "/app/config/frontend.yaml"
  #   - id: backend
  #     name: "Backend Schema"
  #     sourceType: url
  #     url: "https://example.com/backend.yaml"

  # -- Chemin alternatif du fichier ou dossier de configuration (mode local/configmap/secret)
  #    Par défaut, s'il n'est pas défini, utilise "/app/config/schema.yaml"
  path: ""

  # ── Mode : inline ────────────────────────────────────────────────────────────
  # Contenu du schéma YAML injecté dans un ConfigMap créé par le chart.
  # (utilisé uniquement si source: inline)
  inline:
    schema: |
      title: "Mon Application"
      description: "Remplissez le formulaire pour générer votre configuration."
      fields:
        - name: app_name
          label: "Nom de l'application"
          type: string
          default: "my-app"
          required: true

  # ── Mode : configmap ──────────────────────────────────────────────────────────
  # (utilisé uniquement si source: configmap)
  configmap:
    name: ""    # -- Nom du ConfigMap Kubernetes existant contenant schema.yaml

  # ── Mode : secret ─────────────────────────────────────────────────────────────
  # (utilisé uniquement si source: secret)
  secret:
    name: ""    # -- Nom du Secret Kubernetes existant contenant schema.yaml

  # ── Mode : url ────────────────────────────────────────────────────────────────
  # (utilisé uniquement si source: url)
  url:
    address: ""         # -- URL HTTP/HTTPS du fichier de schéma (yaml, json, tf)
    ignoreSsl: false    # -- Ignorer la vérification du certificat SSL

  # ── Mode : git ────────────────────────────────────────────────────────────────
  # (utilisé uniquement si source: git)
  git:
    # -- URL du dépôt Git (sans token — le token est injecté séparément)
    repoUrl: ""
    # -- Branche à cloner
    branch: main
    # -- Chemin du fichier de configuration dans le dépôt
    configPath: variables.tf
    # -- Token d'authentification Git (sera stocké dans un Secret Kubernetes)
    #    Laisser vide si vous utilisez existingTokenSecret ou un repo public
    token: ""
    # -- Nom d'un Secret Kubernetes existant contenant la clé "GIT_TOKEN"
    #    Si défini, il est utilisé à la place de git.token
    existingTokenSecret: ""

# ──────────────────────────────────────────────
# Kubernetes Resources
# ──────────────────────────────────────────────
service:
  # -- Type de service Kubernetes
  type: ClusterIP
  # -- Port exposé par le service
  port: 80

ingress:
  # -- Activer l'Ingress
  enabled: false
  # -- Classe d'ingress (nginx, traefik, etc.)
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: formatter.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: formatter-tls
  #    hosts:
  #      - formatter.example.com

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# -- Annotations du pod
podAnnotations: {}

# -- Security context du pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Liveness probe
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
