# -- Nombre de réplicas du pod
replicaCount: 1

image:
  # -- Registre + nom de l'image
  repository: ghcr.io/ookami-git/formatter
  # -- Tag de l'image (défaut: chart appVersion)
  tag: ""
  # -- Politique de pull
  pullPolicy: IfNotPresent

# -- Secrets pour pull images privées (ghcr.io nécessite un token)
imagePullSecrets: []
#  - name: ghcr-pull-secret

nameOverride: ""
fullnameOverride: ""

# ──────────────────────────────────────────────
# Configuration de l'application
# ──────────────────────────────────────────────
app:
  # -- Port d'écoute du serveur
  port: 3000

  # -- Dossier à scanner pour charger automatiquement plusieurs configurations.
  #    Idéal pour monter un ConfigMap ou Secret contenant plusieurs fichiers.
  #    L'application scannera alors tous les fichiers (.yaml, .yml, .json, .tf) de ce dossier.
  configsDir: ""

  # -- Liste de configurations gérées par l'application.
  #    Chaque entrée représente un schéma indépendant. S'il n'y a qu'une seule configuration,
  #    l'interface masquera le sélecteur de configuration et fonctionnera en mode standard.
  configs:
    - id: default
      name: "Configuration principale"
      # -- Source du schéma : inline | configmap | secret | url | git
      source: inline

      # -- Schéma défini en ligne (si source: inline)
      inline:
        schema: |
          title: "Mon Application"
          description: "Remplissez le formulaire pour générer votre configuration."
          fields:
            - name: app_name
              label: "Nom de l'application"
              type: string
              default: "my-app"
              required: true

      # -- ConfigMap existant à monter (si source: configmap)
      configmap:
        name: ""
        key: "schema.yaml"

      # -- Secret existant à monter (si source: secret)
      secret:
        name: ""
        key: "schema.yaml"

      # -- URL distante du schéma (si source: url)
      url:
        address: ""
        ignoreSsl: false

      # -- Dépôt Git à cloner (si source: git)
      git:
        repoUrl: ""
        branch: main
        configPath: variables.tf
        token: ""
        existingTokenSecret: ""

# ──────────────────────────────────────────────
# Kubernetes Resources
# ──────────────────────────────────────────────
service:
  # -- Type de service Kubernetes
  type: ClusterIP
  # -- Port exposé par le service
  port: 80

ingress:
  # -- Activer l'Ingress
  enabled: false
  # -- Classe d'ingress (nginx, traefik, etc.)
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: formatter.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: formatter-tls
  #    hosts:
  #      - formatter.example.com

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# -- Annotations du pod
podAnnotations: {}

# -- Security context du pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Liveness probe
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
