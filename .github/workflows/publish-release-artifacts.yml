name: Publish release artifacts

on:
  workflow_call:
    inputs:
      version:
        description: Semantic version to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Existing semantic version to publish (for example 1.1.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      image: ${{ steps.registry.outputs.image }}
      chart_registry: ${{ steps.registry.outputs.chart_registry }}
    steps:
      - id: version
        shell: bash
        run: |
          VERSION='${{ inputs.version }}'
          [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]
          echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
      - id: registry
        shell: bash
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "chart_registry=oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/charts" >> "$GITHUB_OUTPUT"

  docker:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.validate-version.outputs.image }}:${{ inputs.version }}
            ${{ needs.validate-version.outputs.image }}:${{ needs.validate-version.outputs.major }}.${{ needs.validate-version.outputs.minor }}
            ${{ needs.validate-version.outputs.image }}:${{ needs.validate-version.outputs.major }}
            ${{ needs.validate-version.outputs.image }}:latest
          build-args: |
            APP_VERSION=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Validate and package chart
        id: chart
        shell: bash
        run: |
          VERSION='${{ inputs.version }}'
          test "$(awk '/^version:/{print $2}' helm/Chart.yaml)" = "$VERSION"
          test "$(awk '/^appVersion:/{gsub(/\"/, \"\", $2); print $2}' helm/Chart.yaml)" = "$VERSION"
          helm lint helm
          helm package helm --destination .
          echo "package=dynamic-form-${VERSION}.tgz" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        shell: bash
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Push OCI chart
        run: helm push "${{ steps.chart.outputs.package }}" "${{ needs.validate-version.outputs.chart_registry }}"
