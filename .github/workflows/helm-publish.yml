name: Publish Helm chart

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Validate and package chart
        id: chart
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          test "$(awk '/^version:/{print $2}' helm/Chart.yaml)" = "$VERSION"
          test "$(awk '/^appVersion:/{gsub(/\"/, \"\", $2); print $2}' helm/Chart.yaml)" = "$VERSION"
          helm lint helm
          helm package helm --destination .
          echo "package=dynamic-form-${VERSION}.tgz" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        shell: bash
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push OCI chart
        run: helm push "${{ steps.chart.outputs.package }}" "oci://ghcr.io/${{ github.repository_owner }}/charts"
