title: "Configuration Déploiement Microservice"
outputFormat: "yaml"
fields:
  - name: appName
    label: "Nom de l'application"
    icon: "fa-solid fa-cube"
    type: "string"
    default: "mon-microservice"
    required: true
    min: 5
    max: 15
    description: "Le nom unique utilisé pour identifier le déploiement."
    validation:
      regex: "^[a-z][a-z0-9-]{2,}$"
      message: "Doit commencer par une lettre minuscule et ne contenir que des minuscules, chiffres et tirets (min. 3 caractères)."
  
  - name: replicaCount
    label: "Nombre de Réplicas"
    type: "integer"
    default: 3
    required: true
    min: 1
    max: 5
    description: "Le nombre d'instances du pod à exécuter en parallèle."

  - name: port
    label: "Port du Conteneur"
    type: "integer"
    default: 8080
    required: true
    description: "Le port sur lequel l'application écoute."

  - name: environment
    label: "Environnement"
    type: "select"
    default: "production"
    options: ["development", "staging", "production"]
    description: "L'environnement cible pour le déploiement."

  - name: imageTag
    label: "Tag de l'image Docker"
    type: "string"
    default: "latest"
    description: "Le tag de l'image Docker à déployer."
    validation:
      regex: "^[a-zA-Z0-9._-]+$"
      message: "Le tag ne peut contenir que des lettres, chiffres, points, tirets et underscores."

  - name: enableIngress
    label: "Activer Ingress (Routeur)"
    type: "boolean"
    default: true
    description: "Permet d'exposer l'application vers l'extérieur du cluster."

  - name: resources
    label: "Limites de Ressources"
    icon: "fa-solid fa-microchip"
    type: "object"
    description: "Définition des allocations de ressources CPU et Mémoire."
    fields:
      - name: cpuLimit
        label: "Limite CPU"
        type: "string"
        default: "500m"
        validation:
          regex: "^[0-9]+(m|\\.[0-9]+)?$"
          message: "Format CPU invalide. Exemples valides : 500m, 1, 0.5"
      - name: memoryLimit
        label: "Limite Mémoire"
        type: "string"
        default: "512Mi"
        validation:
          regex: "^[0-9]+(Mi|Gi|M|G|Ki|K)$"
          message: "Format mémoire invalide. Exemples valides : 512Mi, 1Gi, 256M"

  - name: environmentVariables
    label: "Variables d'Environnement"
    type: "array"
    itemType: "object"
    min: 2
    max: 4
    description: "Variables d'environnement injectées dans le conteneur."
    fields:
      - name: name
        label: "Nom de la variable"
        type: "string"
        required: true
        validation:
          regex: "^[A-Z_][A-Z0-9_]*$"
          message: "Le nom doit être en MAJUSCULES avec des underscores uniquement."
      - name: value
        label: "Valeur"
        type: "string"
        required: true

  - name: extraConfig
    label: "Configuration Supplémentaire"
    type: "object"
    dynamicKeys: true
    min: 2
    max: 4
    keyLabel: "Clé de configuration"
    description: "Configuration personnalisée sous forme de paires clé-valeur."
    fields:
      - name: value
        label: "Valeur"
        type: "string"
        required: true
